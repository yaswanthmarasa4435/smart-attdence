<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Panel | SmartAttend</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="container">
    <section class="card auth-card" id="studentLoginCard">
      <h2>Student Login / Profile Setup</h2>
      <form id="studentLoginForm">
        <label>Student ID</label>
        <input type="text" id="studentId" placeholder="STU001" required />
        <label>Student Name</label>
        <input type="text" id="studentName" required />
        <label>Password</label>
        <input type="password" id="studentPassword" required />
        <label>Face image (required for first-time profile)</label>
        <input type="file" id="faceUpload" accept="image/*" />
        <button class="btn" type="submit">Continue</button>
      </form>
      <p class="muted small">Only IDs pre-created by admin can register/login.</p>
    </section>

    <section class="hidden" id="studentPanel">
      <header class="top-row">
        <h1>Student Attendance</h1>
        <button class="btn btn-outline" id="logoutStudentBtn">Logout</button>
      </header>

      <div class="grid-2">
        <article class="card">
          <h3>1) Scan Teacher QR</h3>
          <div id="qr-reader"></div>
          <p class="muted small">Allow camera permission to scan QR.</p>
          <p id="liveScanStatus" class="muted small">Live scan is starting...</p>
        </article>

        <article class="card">
          <h3>2) Face Verification</h3>
          <video id="faceVideo" autoplay muted playsinline></video>
          <button class="btn" id="verifyFaceBtn" disabled>Verify Face &amp; Mark Attendance</button>
          <p id="studentStatus" class="muted">Scan a valid QR code first.</p>
        </article>
      </div>

      <article class="card mt-16">
        <h3>Attendance History</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Subject</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="studentHistoryBody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
  <script type="module" src="js/student.js"></script>
</body>
</html>
